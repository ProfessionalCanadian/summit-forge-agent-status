<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summit Forge Labs — AI Team Status</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0f1a;
      --surface:      #13172a;
      --surface-2:    #1a1f35;
      --border:       #252a42;
      --gold:         #c9a84c;
      --gold-light:   #e8c86a;
      --copper:       #b87333;
      --copper-light: #d4904a;
      --silver:       #c8cdd6;
      --text-primary: #f0f0f2;
      --text-muted:   #8a8d96;

      /* Derived / convenience */
      --border-h:     #3a4268;
      --gold-glow:    rgba(201, 168, 76, 0.18);

      --status-awake:      #3fb950;
      --status-awake-bg:   rgba(63, 185, 80, 0.12);
      --status-working:    #d4a843;
      --status-working-bg: rgba(212, 168, 67, 0.12);
      --status-standby:    #6e8cad;
      --status-standby-bg: rgba(110, 140, 173, 0.12);
      --status-dreaming:   #a371f7;
      --status-dreaming-bg:rgba(163, 113, 247, 0.12);
      --status-offline:    #f85149;
      --status-offline-bg: rgba(248, 81, 73, 0.12);

      --health-good:     #3fb950;
      --health-degraded: #d4a843;
      --health-paused:   #484f58;
      --health-bad:      #f85149;

      --radius-card: 14px;
      --radius-badge: 6px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ────────────────────────────────────────────────────────── */
    .site-header {
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0a0c16 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-logo {
      height: 56px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
    }

    .header-wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--silver);
      line-height: 1.15;
      text-transform: uppercase;
    }

    .header-title span {
      color: var(--gold);
    }

    .header-subtitle {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(63, 185, 80, 0.08);
      border: 1px solid rgba(63, 185, 80, 0.22);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      color: var(--status-awake);
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--status-awake);
      animation: pulse-green 2s infinite;
    }

    /* ─── Main Content ──────────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 32px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ─── Grid ──────────────────────────────────────────────────────────── */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ─── Agent Card ────────────────────────────────────────────────────── */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      border-radius: var(--radius-card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      cursor: default;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      position: relative;
      overflow: hidden;
    }

    /* Subtle inner surface gradient */
    .agent-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, var(--surface-2) 0%, transparent 55%);
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .agent-card:hover {
      border-color: var(--gold);
      border-top-color: var(--gold-light);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        0 0 0 1px rgba(201, 168, 76, 0.15),
        inset 0 1px 0 rgba(201, 168, 76, 0.08);
      transform: translateY(-2px);
    }

    .agent-card:hover::before { opacity: 1; }

    /* Status-colored top accent — overrides default gold on hover for active states */
    .agent-card[data-status="awake"]    { border-top-color: var(--status-awake); }
    .agent-card[data-status="working"]  { border-top-color: var(--status-working); }
    .agent-card[data-status="standby"]  { border-top-color: var(--status-standby); }
    .agent-card[data-status="dreaming"] { border-top-color: var(--status-dreaming); }
    .agent-card[data-status="offline"]  { border-top-color: var(--status-offline); }

    /* ─── Card Top Row ──────────────────────────────────────────────────── */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    /* ─── Avatar ────────────────────────────────────────────────────────── */
    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--border);
      transition: border-color var(--transition);
      flex-shrink: 0;
    }

    .agent-card:hover .avatar { border-color: rgba(201, 168, 76, 0.4); }

    .avatar svg { display: block; width: 100%; height: 100%; }

    .health-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--surface);
      transition: background var(--transition);
    }

    .health-dot[data-health="good"]     { background: var(--health-good); }
    .health-dot[data-health="degraded"] { background: var(--health-degraded); animation: pulse-amber 2s infinite; }
    .health-dot[data-health="paused"]   { background: var(--health-paused); }
    .health-dot[data-health="bad"]      { background: var(--health-bad); animation: pulse-red 1.5s infinite; }

    /* ─── Agent Identity ────────────────────────────────────────────────── */
    .agent-identity {
      flex: 1;
      min-width: 0;
      padding-top: 4px;
    }

    .agent-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text-primary);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-role {
      font-size: 12px;
      font-weight: 600;
      color: var(--copper);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .agent-model {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      margin-top: 5px;
    }

    /* ─── Status Badge ──────────────────────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-badge);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: capitalize;
      border: 1px solid transparent;
      margin-top: 10px;
    }

    .status-pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-badge[data-status="awake"] {
      background: var(--status-awake-bg);
      color: var(--status-awake);
      border-color: rgba(63, 185, 80, 0.25);
    }
    .status-badge[data-status="awake"] .status-pip {
      background: var(--status-awake);
      animation: pulse-green 2s infinite;
    }

    .status-badge[data-status="working"] {
      background: var(--status-working-bg);
      color: var(--status-working);
      border-color: rgba(212, 168, 67, 0.3);
    }
    .status-badge[data-status="working"] .status-pip {
      background: var(--status-working);
      animation: pulse-amber 1.5s infinite;
    }

    .status-badge[data-status="standby"] {
      background: var(--status-standby-bg);
      color: var(--status-standby);
      border-color: rgba(110, 140, 173, 0.25);
    }
    .status-badge[data-status="standby"] .status-pip {
      background: var(--status-standby);
    }

    .status-badge[data-status="dreaming"] {
      background: var(--status-dreaming-bg);
      color: var(--status-dreaming);
      border-color: rgba(163, 113, 247, 0.25);
    }
    .status-badge[data-status="dreaming"] .status-pip {
      background: var(--status-dreaming);
      animation: pulse-purple 3s infinite;
    }

    .status-badge[data-status="offline"] {
      background: var(--status-offline-bg);
      color: var(--status-offline);
      border-color: rgba(248, 81, 73, 0.25);
    }
    .status-badge[data-status="offline"] .status-pip {
      background: var(--status-offline);
    }

    /* ─── Divider ────────────────────────────────────────────────────────── */
    .card-divider {
      height: 1px;
      background: var(--border);
    }

    /* ─── Task Row ──────────────────────────────────────────────────────── */
    .card-task {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .task-text {
      font-size: 13px;
      color: var(--silver);
      opacity: 0.85;
      line-height: 1.45;
    }

    .task-text.idle {
      color: var(--text-muted);
      font-style: italic;
    }

    /* ─── Meta Row ──────────────────────────────────────────────────────── */
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .meta-notes {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .last-seen {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .last-seen.fresh  { color: var(--status-awake); }
    .last-seen.recent { color: var(--silver); opacity: 0.7; }

    /* ─── Footer ────────────────────────────────────────────────────────── */
    .site-footer {
      padding: 20px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-text {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .footer-brand {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .footer-brand strong {
      color: var(--gold);
      font-weight: 600;
    }

    .footer-text strong { color: var(--silver); font-weight: 500; opacity: 0.8; }

    .footer-refresh {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
    }

    .refresh-spinner.spinning { animation: spin 1s linear infinite; }

    /* ─── Error Banner ──────────────────────────────────────────────────── */
    .error-banner {
      display: none;
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid rgba(248, 81, 73, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--status-offline);
    }

    .error-banner.visible { display: block; }

    /* ─── Animations ────────────────────────────────────────────────────── */
    @keyframes pulse-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.5); }
      50%       { opacity: 0.85; box-shadow: 0 0 0 4px rgba(63, 185, 80, 0); }
    }

    @keyframes pulse-amber {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(212, 168, 67, 0.5); }
      50%       { opacity: 0.85; box-shadow: 0 0 0 4px rgba(212, 168, 67, 0); }
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.5); }
      50%       { opacity: 0.85; box-shadow: 0 0 0 4px rgba(248, 81, 73, 0); }
    }

    @keyframes pulse-purple {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(163, 113, 247, 0.4); }
      50%       { opacity: 0.75; box-shadow: 0 0 0 5px rgba(163, 113, 247, 0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .agent-card { animation: fadeInUp 0.3s ease both; }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .site-header { padding: 20px 16px; }
      .header-logo { height: 44px; }
      .main { padding: 20px 16px; }
      .site-footer { padding: 16px; }
      .agent-grid { grid-template-columns: 1fr; }
      .header-actions { display: none; }
    }

    @media (max-width: 900px) {
      .agent-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <img class="header-logo" src="logo-dark-bg.jpg" alt="Summit Forge Labs" />
    <div class="header-wordmark">
      <h1 class="header-title">Summit <span>Forge</span> Labs</h1>
      <p class="header-subtitle">AI Team Status</p>
    </div>
    <div class="header-actions">
      <div class="live-badge">
        <span class="live-dot"></span>
        Live
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="error-banner" id="error-banner">
      ⚠ Could not load agent data. Showing last known state.
    </div>
    <p class="section-label" id="agent-count">— agents</p>
    <div class="agent-grid" id="agent-grid">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="footer-brand"><strong>Summit Forge Labs</strong> — AI Operations &nbsp;·&nbsp; SFL Internal</p>
    <p class="footer-text">
      Last updated: <strong id="last-updated">—</strong>
    </p>
    <div class="footer-refresh">
      <div class="refresh-spinner" id="refresh-spinner"></div>
      <span id="refresh-label">Auto-refresh in 30s</span>
    </div>
  </footer>

  <script>
    // ─── Configuration ───────────────────────────────────────────────────
    const DATA_URL   = './agent-status.json';
    const REFRESH_MS = 30_000;
    const STALE_FRESH  = 5 * 60 * 1000;
    const STALE_RECENT = 60 * 60 * 1000;

    // ─── State ───────────────────────────────────────────────────────────
    let countdown    = REFRESH_MS / 1000;
    let countdownTid = null;
    let refreshTid   = null;
    let lastData     = null;

    // ─── Silhouette Avatar SVG ────────────────────────────────────────────
    // Generic head-and-shoulders bust in mid-grey on dark navy circle.
    // Same for every agent — professional placeholder, not initials.
    function avatarSVG() {
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
        <!-- background circle -->
        <circle cx="48" cy="48" r="48" fill="#1a1f35"/>
        <!-- head -->
        <circle cx="48" cy="36" r="14" fill="#4a5060"/>
        <!-- shoulders / bust -->
        <path d="M14,96 C14,72 24,62 48,62 C72,62 82,72 82,96 Z" fill="#4a5060"/>
      </svg>`;
    }

    // ─── Helpers ─────────────────────────────────────────────────────────
    function timeAgo(iso) {
      if (!iso) return null;
      const diff = Date.now() - new Date(iso).getTime();
      if (diff < 0) return 'just now';
      const s = Math.floor(diff / 1000);
      if (s < 60)  return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60)  return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24)  return `${h}h ago`;
      const d = Math.floor(h / 24);
      return `${d}d ago`;
    }

    function lastSeenClass(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      if (diff < STALE_FRESH)  return 'fresh';
      if (diff < STALE_RECENT) return 'recent';
      return '';
    }

    function fmtDatetime(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ─── Render ──────────────────────────────────────────────────────────
    function renderCard(agent, index) {
      const status  = (agent.status || 'offline').toLowerCase();
      const health  = (agent.health || 'good').toLowerCase();
      const task    = agent.current_task || null;
      const seen    = timeAgo(agent.last_seen);
      const seenCls = lastSeenClass(agent.last_seen);

      return `
        <article class="agent-card" data-status="${status}" data-id="${agent.id}"
          style="animation-delay:${index * 50}ms">
          <div class="card-top">
            <div class="avatar-wrap">
              <div class="avatar">${avatarSVG()}</div>
              <div class="health-dot" data-health="${health}" title="Health: ${health}"></div>
            </div>
            <div class="agent-identity">
              <div class="agent-name">${agent.name}</div>
              <div class="agent-role">${agent.role}</div>
              <div class="agent-model">${agent.model || ''}</div>
              <div class="status-badge" data-status="${status}">
                <span class="status-pip"></span>
                ${status}
              </div>
            </div>
          </div>

          <div class="card-divider"></div>

          <div class="card-task">
            <span class="task-label">Current Task</span>
            <span class="task-text${task ? '' : ' idle'}">${task || 'Idle'}</span>
          </div>

          <div class="card-meta">
            <span class="meta-notes" title="${agent.notes || ''}">${agent.notes || ''}</span>
            <span class="last-seen ${seenCls}" title="${agent.last_seen ? fmtDatetime(agent.last_seen) : 'Never'}">
              ${seen ? seen : 'Never seen'}
            </span>
          </div>
        </article>
      `.trim();
    }

    function render(data) {
      lastData = data;
      const agents     = data.agents || [];
      const grid       = document.getElementById('agent-grid');
      const count      = document.getElementById('agent-count');
      const lastUpdated = document.getElementById('last-updated');

      count.textContent = `${agents.length} agent${agents.length !== 1 ? 's' : ''}`;
      lastUpdated.textContent = fmtDatetime(data.last_updated || new Date().toISOString());

      grid.innerHTML = agents.map((a, i) => renderCard(a, i)).join('');
    }

    // ─── Fetch ───────────────────────────────────────────────────────────
    async function fetchData() {
      const spinner = document.getElementById('refresh-spinner');
      const banner  = document.getElementById('error-banner');
      spinner.classList.add('spinning');
      try {
        const res = await fetch(DATA_URL + '?_=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(data);
        banner.classList.remove('visible');
      } catch (err) {
        console.warn('Status page fetch error:', err);
        banner.classList.add('visible');
      } finally {
        spinner.classList.remove('spinning');
      }
    }

    // ─── Countdown ───────────────────────────────────────────────────────
    function startCountdown() {
      countdown = REFRESH_MS / 1000;
      clearInterval(countdownTid);
      countdownTid = setInterval(() => {
        countdown--;
        const label = document.getElementById('refresh-label');
        if (countdown > 0) {
          label.textContent = `Auto-refresh in ${countdown}s`;
        } else {
          label.textContent = 'Refreshing…';
        }
      }, 1000);
    }

    function scheduleRefresh() {
      clearTimeout(refreshTid);
      refreshTid = setTimeout(async () => {
        await fetchData();
        startCountdown();
        scheduleRefresh();
      }, REFRESH_MS);
    }

    // ─── Boot ─────────────────────────────────────────────────────────────
    (async () => {
      await fetchData();
      startCountdown();
      scheduleRefresh();
    })();
  </script>
</body>
</html>
